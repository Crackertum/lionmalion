<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agora Web Quickstart - Lion Malion Edition</title>
    <style>
        :root {
            --black: #000000;
            --uda-yellow: #FFD700;
            --uda-green: #008000;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .video-container {
            width: 100%;
            height: 300px;
            background: var(--black);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.8rem;
            z-index: 10;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        button {
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        #join {
            background: var(--uda-green);
            color: white;
            box-shadow: 0 10px 20px rgba(0,128,0,0.2);
        }
        #leave {
            background: #ef4444;
            color: white;
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.2);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="color: var(--black);">Agora Web Quickstart</h1>
            <p style="opacity: 0.6;">Lion Malion Coordination Reference App</p>
        </div>

        <div class="video-grid">
            <div class="video-container" id="local-player-container">
                <div class="video-label">YOU (Local)</div>
                <div id="local-player" style="width: 100%; height: 100%;"></div>
            </div>
            <div id="remote-playerlist" style="display: contents;"></div>
        </div>

        <div class="controls">
            <button id="join">JOIN CHANNEL</button>
            <button id="leave" disabled>LEAVE CHANNEL</button>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
